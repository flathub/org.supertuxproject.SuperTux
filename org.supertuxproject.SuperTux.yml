id: org.supertuxproject.SuperTux
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: supertux2
rename-icon: supertux2
rename-desktop-file: supertux2.desktop
rename-appdata-file: org.supertuxproject.SuperTux.metainfo.xml
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio
  - --share=network
  - --device=all
modules:
  - shared-modules/SDL2/SDL2_image.json
  - shared-modules/physfs/physfs.json
  - name: glm
    buildsystem: cmake
    sources:
      - type: archive
        url: https://github.com/g-truc/glm/archive/refs/tags/1.0.2.tar.gz
        sha256: 19edf2e860297efab1c74950e6076bf4dad9de483826bc95e2e0f2c758a43f65
  - name: supertux
    buildsystem: cmake-ninja
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/app/share/metainfo
      - mkdir -p ${FLATPAK_DEST}/app/share/applications
      - mkdir -p ${FLATPAK_DEST}/app/bin
      - install -Dm644 org.supertuxproject.SuperTux.metainfo.xml ${FLATPAK_DEST}/app/share/metainfo/org.supertuxproject.SuperTux.metainfo.xml
      - install -Dm644 supertux2.desktop ${FLATPAK_DEST}/app/share/applications/supertux2.desktop
      - install -Dm755 supertux2 ${FLATPAK_DEST}/app/bin/supertux2
    config-opts:
      - -DINSTALL_SUBDIR_SHARE=share/supertux2
      - -DINSTALL_SUBDIR_BIN=bin
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DFLATPAK=On
      - -DUSE_GL_LIBRARY=libepoxy
      - -DIS_SUPERTUX_RELEASE=0.7.0
    sources:
      - type: git
        url: https://github.com/SuperTux/supertux.git
        tag: v0.7.0  
